<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — FindIt</title>
  <link rel="stylesheet" href="../public/css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../index.html" class="logo">Find<span>It</span></a>
    <div class="nav-links">
      <a href="lost.html">Lost Items</a>
      <a href="found.html">Found Items</a>
      <a href="post.html" class="btn-post">+ Post Item</a>
    </div>
  </nav>

  <!-- REGISTER SECTION -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- HEADING -->
      <h2>Join FindIt 🎉</h2>
      <p class="auth-subtitle">
        Create your free account and start
        helping the community.
      </p>

      <!-- ERROR MESSAGE -->
      <div class="auth-msg error" id="errorMsg"></div>

      <!-- SUCCESS MESSAGE -->
      <div class="auth-msg success" id="successMsg"></div>

      <!-- FULL NAME -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="name"
            placeholder="Your full name"/>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"/>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            placeholder="Create a strong password"
            oninput="checkStrength(this.value)"/>
        </div>

        <!-- PASSWORD STRENGTH BAR -->
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <p class="strength-text" id="strengthText"></p>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label for="confirmPassword">
          Confirm Password
        </label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Re-enter your password"/>
        </div>
      </div>

      <!-- TERMS CHECKBOX -->
      <div class="terms-group">
        <input type="checkbox" id="terms"/>
        <label for="terms">
          I agree to the
          <a href="#">Terms of Service</a>
          and
          <a href="#">Privacy Policy</a>
        </label>
      </div>

      <!-- REGISTER BUTTON -->
      <button
        class="btn-submit"
        onclick="handleRegister()">
        Create Account
      </button>

      <!-- DIVIDER -->
      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- GOOGLE SIGNUP -->
      <button class="btn-google" onclick="googleRegister()">
        <img
          src="https://www.google.com/favicon.ico"
          width="18"
          height="18"
          alt="Google"/>
        Continue with Google
      </button>

      <!-- LOGIN LINK -->
      <p class="auth-link">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </div>
  </div>

  <script src="../public/js/api.js"></script>
  <script src="../public/js/register.js"></script>
</body>
</html>
